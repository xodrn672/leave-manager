<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연차 관리 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f6f8;--sf:#ffffff;--sa:#f0f1f4;--bd:#e2e4ea;--ac:#4f46e5;--al:#6366f1;--as:rgba(79,70,229,.07);--gn:#059669;--gs:rgba(5,150,105,.07);--rd:#dc2626;--rs:rgba(220,38,38,.07);--yl:#d97706;--ys:rgba(217,119,6,.07);--tx:#1a1a2e;--ts:#64748b;--tm:#94a3b8}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
.sync-ok{background:var(--gn)}.sync-err{background:var(--rd)}

.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f2f5}
.login-card{background:#fff;border:1px solid var(--bd);border-radius:16px;padding:40px 36px;width:380px;max-width:92vw;box-shadow:0 4px 24px rgba(0,0,0,.06);animation:slideUp .4s}
.login-logo{width:48px;height:48px;border-radius:12px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 18px}
.login-title{text-align:center;font-size:20px;font-weight:700;margin-bottom:6px;color:var(--tx)}
.login-sub{text-align:center;font-size:13px;color:var(--ts);margin-bottom:28px}
.login-error{background:var(--rs);color:var(--rd);font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:16px;text-align:center;animation:shake .3s}

.fg{margin-bottom:14px}.fl{display:block;font-size:12px;color:var(--ts);margin-bottom:5px;font-weight:500}
.fi,.fs{width:100%;padding:10px 13px;background:#fff;border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:14px;outline:none;font-family:inherit;transition:border-color .2s}
.fi:focus,.fs:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--as)}.fi::placeholder{color:var(--tm)}
.fr{display:flex;gap:10px}.fr .fg{flex:1}
.pw-wrap{position:relative}.pw-wrap .fi{padding-right:40px}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--tm);cursor:pointer;font-size:15px;padding:2px}

.btn{border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:5px}
.btn:hover{filter:brightness(.95)}.btn:active{transform:scale(.97)}
.btn-p{background:var(--ac);color:#fff}
.btn-g{background:var(--gs);color:var(--gn)}.btn-r{background:var(--rs);color:var(--rd)}
.btn-gh{background:var(--sa);color:var(--ts)}.btn-sm{padding:5px 11px;font-size:12px;border-radius:6px}
.btn-full{width:100%;justify-content:center;padding:11px}
.btn-logout{background:transparent;border:1px solid var(--bd);color:var(--ts);padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-logout:hover{border-color:var(--rd);color:var(--rd)}

.hdr{background:#fff;border-bottom:1px solid var(--bd);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.hdr-l{display:flex;align-items:center;gap:9px}
.hdr-icon{width:30px;height:30px;border-radius:8px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:15px}
.hdr-t{font-size:16px;font-weight:700;color:var(--tx)}
.adm-badge{font-size:10px;background:var(--as);color:var(--ac);padding:2px 8px;border-radius:8px;font-weight:600}
.hdr-r{display:flex;align-items:center;gap:10px}
.hdr-user{display:flex;align-items:center;gap:8px;padding:5px 12px 5px 6px;border-radius:8px;border:1px solid var(--bd);background:#fff}
.hdr-av{width:26px;height:26px;border-radius:7px;background:var(--as);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--ac)}
.hdr-un{font-size:13px;font-weight:500}.hdr-ur{font-size:10px;color:var(--tm)}

.lay{display:flex;min-height:calc(100vh - 56px)}
.side{width:200px;background:#fff;border-right:1px solid var(--bd);padding:14px 8px;flex-shrink:0;display:flex;flex-direction:column}
.nav-b{width:100%;text-align:left;padding:9px 12px;margin-bottom:2px;background:transparent;color:var(--ts);border:none;border-radius:8px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .12s}
.nav-b:hover{background:var(--sa)}.nav-b.act{background:var(--as);color:var(--ac);font-weight:600}
.nav-badge{background:var(--rd);color:#fff;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:auto}
.side-div{border-top:1px solid var(--bd);margin:10px 0;padding-top:10px}
.side-bot{margin-top:auto;padding-top:10px;border-top:1px solid var(--bd)}
.cnt{flex:1;padding:24px;overflow-y:auto;animation:slideUp .25s}

.sc{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.scard{background:#fff;border-radius:12px;padding:20px;border:1px solid var(--bd);flex:1;min-width:145px}
.sl{font-size:11px;color:var(--ts);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.sv{font-size:28px;font-weight:700;line-height:1}
.ss{font-size:11px;color:var(--tm);margin-top:5px}

.panel{background:#fff;border-radius:12px;padding:20px;border:1px solid var(--bd);margin-bottom:20px}
.panel-t{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--tx)}
.pbar{background:var(--sa);border-radius:6px;height:8px;overflow:hidden}
.pfill{height:100%;background:var(--ac);border-radius:6px;transition:width .5s ease}

.badge{padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600;display:inline-block}
.b-ok{background:var(--gs);color:var(--gn)}.b-pn{background:var(--ys);color:var(--yl)}.b-rj{background:var(--rs);color:var(--rd)}
.b-adm{background:var(--as);color:var(--ac)}.b-mem{background:var(--sa);color:var(--ts)}

.tw{overflow-x:auto}table{width:100%;border-collapse:collapse}
thead{background:var(--sa)}th{padding:10px 14px;text-align:left;font-size:11px;color:var(--ts);font-weight:600;border-bottom:1px solid var(--bd);text-transform:uppercase;letter-spacing:.3px}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--bd)}

.rcard{background:#fff;border-radius:12px;padding:18px;border:1px solid var(--bd);margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;animation:slideUp .25s}
.ecard{background:#fff;border-radius:12px;padding:18px;border:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.einfo{display:flex;align-items:center;gap:12px}
.eav{width:38px;height:38px;border-radius:10px;background:var(--as);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:var(--ac)}
.hrow{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;background:#fff;border-radius:8px;margin-bottom:5px;border:1px solid var(--bd);font-size:13px}
.ritem{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bd)}
.empty{text-align:center;color:var(--tm);padding:36px;font-size:13px}

.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cdn{text-align:center;font-size:11px;font-weight:600;color:var(--ts);padding:7px 0}.cdn.sun{color:var(--rd)}.cdn.sat{color:#3b82f6}
.cc{border-radius:8px;padding:5px 3px;min-height:68px;border:1px solid transparent}.cc.tod{background:var(--as);border-color:var(--ac)}
.cd{font-size:12px;text-align:center;margin-bottom:3px;color:var(--tx)}.cd.we{color:var(--rd)}.cd.tn{font-weight:700;color:var(--ac)}
.cev{font-size:9px;padding:2px 5px;border-radius:3px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;border-left:2px solid}
.cleg{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
.cli{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ts)}
.cld{width:8px;height:8px;border-radius:2px}

.mo{position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .15s}
.modal{background:#fff;border-radius:14px;padding:26px;width:90%;max-width:440px;border:1px solid var(--bd);box-shadow:0 12px 40px rgba(0,0,0,.1);animation:slideUp .25s;max-height:90vh;overflow-y:auto}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.mh h3{font-size:17px;font-weight:700}
.mc{background:transparent;border:none;color:var(--ts);font-size:18px;cursor:pointer;padding:4px}

@media(max-width:768px){
.side{width:52px;padding:14px 4px}.nav-tx,.side-bot{display:none}.nav-b{justify-content:center;padding:9px 6px}.nav-badge{display:none}
.cnt{padding:14px}.sc{flex-direction:column}.hdr{padding:0 12px}.hdr-un,.hdr-ur{display:none}
.rcard{flex-direction:column;gap:10px}.ecard{flex-direction:column;gap:10px;align-items:flex-start}
.login-card{padding:28px 22px}.fr{flex-direction:column;gap:0}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══ API (서버 통신) ═══
const API = window.location.origin;
let syncOk = true;

async function loadData() {
  try {
    const res = await fetch(API + '/api/data');
    const data = await res.json();
    syncOk = true;
    return data;
  } catch {
    syncOk = false;
    return null;
  }
}

async function saveToServer(data) {
  try {
    await fetch(API + '/api/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    syncOk = true;
  } catch {
    syncOk = false;
  }
}

// ═══ STATE ═══
let D = {}, LU = null, CT = 'dashboard', CY, CM, LE = '';

async function init() {
  const n = new Date(); CY = n.getFullYear(); CM = n.getMonth();
  const serverData = await loadData();
  if (serverData) {
    D = serverData;
  } else {
    alert('서버에 연결할 수 없습니다. 서버가 실행 중인지 확인해주세요.');
    return;
  }
  const ss = sessionStorage.getItem('leave-s');
  if (ss) { const a = D.accounts.find(x => x.id === ss); if (a) LU = a; }
  R();
  // 5초마다 서버에서 최신 데이터 가져오기
  setInterval(async () => {
    const fresh = await loadData();
    if (fresh && LU) {
      D = fresh;
      // 로그인 유지 확인
      const stillExists = D.accounts.find(a => a.id === LU.id);
      if (!stillExists) { LU = null; sessionStorage.removeItem('leave-s'); }
      R();
    }
  }, 5000);
}

async function sv() { await saveToServer(D); }
async function resetAll() {
  if (!confirm('모든 데이터를 초기화하시겠습니까?')) return;
  try {
    await fetch(API + '/api/reset', { method: 'POST' });
    const fresh = await loadData();
    if (fresh) D = fresh;
  } catch {}
  R();
}

const gid = () => 'id' + Math.random().toString(36).slice(2, 10);
const td = () => new Date().toISOString().split('T')[0];
const fd = (y, m, d) => `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

function cdays(s, e, t) {
  const a = new Date(s), b = new Date(e); let d = 0;
  for (let x = new Date(a); x <= b; x.setDate(x.getDate() + 1)) { const w = x.getDay(); if (w !== 0 && w !== 6) d++; }
  if (t && t.startsWith('반차')) return d > 0 ? d - 0.5 : 0.5; return d;
}

function uLeave(eid) { return D.leaveRequests.filter(r => r.employeeId === eid && r.status === 'approved').reduce((s, r) => s + cdays(r.startDate, r.endDate, r.type), 0); }
function gE(id) { return D.employees.find(e => e.id === id); }
function myE() { return LU ? gE(LU.employeeId) : null; }
function isA() { const e = myE(); return e?.role === 'admin'; }

const pal = ['#4f46e5', '#059669', '#dc2626', '#d97706', '#3b82f6', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316', '#14b8a6'];
function eCol(eid) { const i = D.employees.findIndex(e => e.id === eid); return pal[i % pal.length]; }
function bH(st) { const m = { approved: ['승인', 'b-ok'], pending: ['대기', 'b-pn'], rejected: ['반려', 'b-rj'] }; const [l, c] = m[st] || m.pending; return `<span class="badge ${c}">${l}</span>`; }
function rB(r) { return r === 'admin' ? '<span class="badge b-adm">관리자</span>' : '<span class="badge b-mem">일반</span>'; }

function doLogin() {
  const l = document.getElementById('lid').value.trim(), p = document.getElementById('lpw').value;
  if (!l || !p) { LE = '아이디와 비밀번호를 입력해주세요.'; R(); return; }
  const a = D.accounts.find(x => x.loginId === l && x.password === p);
  if (!a) { LE = '아이디 또는 비밀번호가 올바르지 않습니다.'; R(); return; }
  LU = a; LE = ''; CT = 'dashboard'; sessionStorage.setItem('leave-s', a.id); R();
}
function doLogout() { LU = null; LE = ''; sessionStorage.removeItem('leave-s'); R(); }
function lkd(e) { if (e.key === 'Enter') doLogin(); }
function tpw() { const e = document.getElementById('lpw'); e.type = e.type === 'password' ? 'text' : 'password'; }

function R() { document.getElementById('app').innerHTML = LU ? rMain() : rLogin(); if (!LU) { const e = document.getElementById('lid'); if (e) e.focus(); } }
function sTab(id) { CT = id; R(); }

function rLogin() {
  return `<div class="login-wrap"><div class="login-card">
<div class="login-logo">🗓</div>
<div class="login-title">연차 관리 시스템</div>
<div class="login-sub">계정 정보를 입력하여 로그인하세요</div>
${LE ? `<div class="login-error">${LE}</div>` : ''}
<div class="fg"><label class="fl">아이디</label><input class="fi" id="lid" placeholder="아이디를 입력하세요" onkeydown="lkd(event)" autocomplete="off"></div>
<div class="fg"><label class="fl">비밀번호</label><div class="pw-wrap"><input class="fi" id="lpw" type="password" placeholder="비밀번호를 입력하세요" onkeydown="lkd(event)"><button class="pw-toggle" onclick="tpw()" type="button">👁</button></div></div>
<button class="btn btn-p btn-full" style="margin-top:8px" onclick="doLogin()">로그인</button>
</div></div>`;
}

function rMain() {
  const e = myE(), adm = isA(), pn = D.leaveRequests.filter(r => r.status === 'pending').length;
  const tabs = [{ id: 'dashboard', i: '📊', l: '대시보드' }, { id: 'calendar', i: '📅', l: '캘린더' }, { id: 'requests', i: '📋', l: '연차 내역' }];
  if (adm) { tabs.push({ id: 'approve', i: '✅', l: '승인 관리' }); tabs.push({ id: 'employees', i: '👥', l: '직원 관리' }); tabs.push({ id: 'accounts', i: '🔐', l: '계정 관리' }); }
  return `<div class="hdr"><div class="hdr-l"><div class="hdr-icon">🗓</div><span class="hdr-t">연차 관리</span>${adm ? '<span class="adm-badge">관리자</span>' : ''}<span style="font-size:10px;color:var(--tm);margin-left:8px"><span class="sync-dot ${syncOk ? 'sync-ok' : 'sync-err'}"></span>${syncOk ? '연결됨' : '연결 끊김'}</span></div>
<div class="hdr-r"><div class="hdr-user"><div class="hdr-av">${e?.name?.[0] || '?'}</div><div><div class="hdr-un">${e?.name || ''}</div><div class="hdr-ur">${e?.department || ''}</div></div></div>
<button class="btn-logout" onclick="doLogout()">로그아웃</button></div></div>
<div class="lay"><div class="side">
${tabs.map(t => `<button class="nav-b ${CT === t.id ? 'act' : ''}" onclick="sTab('${t.id}')"><span>${t.i}</span><span class="nav-tx">${t.l}</span>${t.id === 'approve' && pn > 0 ? `<span class="nav-badge">${pn}</span>` : ''}</button>`).join('')}
<div class="side-div"><button class="btn btn-p btn-full" onclick="openNR()">+ 연차 신청</button></div>
<div class="side-bot"><button class="nav-b" onclick="openMyAcc()"><span>⚙</span><span class="nav-tx">내 정보</span></button></div>
</div><div class="cnt">${rCnt()}</div></div>`;
}

function rCnt() {
  switch (CT) {
    case 'dashboard': return rDash(); case 'calendar': return rCal(); case 'requests': return rReqs();
    case 'approve': return isA() ? rAppr() : ''; case 'employees': return isA() ? rEmps() : ''; case 'accounts': return isA() ? rAccs() : ''; default: return '';
  }
}

function rDash() {
  const e = myE(), u = uLeave(e.id), rem = e.totalLeave - u, pct = e.totalLeave ? Math.round(u / e.totalLeave * 100) : 0;
  const pn = D.leaveRequests.filter(r => r.status === 'pending').length, adm = isA();
  const mr = D.leaveRequests.filter(r => r.employeeId === e.id).sort((a, b) => b.createdAt.localeCompare(a.createdAt)).slice(0, 5);
  return `<h2 style="margin-bottom:20px;font-size:20px;font-weight:700">안녕하세요, ${e.name}님</h2>
<div class="sc">
<div class="scard"><div class="sl">총 연차</div><div class="sv">${e.totalLeave}</div><div class="ss">일</div></div>
<div class="scard"><div class="sl">사용</div><div class="sv" style="color:var(--ac)">${u}</div><div class="ss">일</div></div>
<div class="scard"><div class="sl">잔여</div><div class="sv" style="color:${rem <= 3 ? 'var(--rd)' : 'var(--gn)'}">${rem}</div><div class="ss">일</div></div>
${adm ? `<div class="scard"><div class="sl">승인 대기</div><div class="sv" style="color:${pn > 0 ? 'var(--yl)' : 'var(--tm)'}">${pn}</div><div class="ss">건</div></div>` : ''}
</div>
<div class="panel"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:13px;font-weight:600">연차 사용률</span><span style="font-size:13px;color:var(--ac);font-weight:600">${pct}%</span></div><div class="pbar"><div class="pfill" style="width:${pct}%"></div></div></div>
<div class="panel"><div class="panel-t">최근 신청</div>
${mr.length ? mr.map(r => `<div class="ritem"><div><div style="font-size:13px;font-weight:500">${r.startDate === r.endDate ? r.startDate : r.startDate + ' ~ ' + r.endDate}</div><div style="font-size:11px;color:var(--ts);margin-top:2px">${r.type} · ${r.reason}</div></div>${bH(r.status)}</div>`).join('') : '<div class="empty">신청 내역이 없습니다</div>'}
</div>`;
}

function rCal() {
  const sd = new Date(CY, CM, 1).getDay(), dim = new Date(CY, CM + 1, 0).getDate(), t = td();
  const ap = D.leaveRequests.filter(r => r.status === 'approved');
  const dn = ['일', '월', '화', '수', '목', '금', '토'];
  let c = ''; for (let i = 0; i < sd; i++) c += '<div></div>';
  for (let d = 1; d <= dim; d++) {
    const ds = fd(CY, CM, d), it = ds === t, dw = new Date(CY, CM, d).getDay(), iw = dw === 0 || dw === 6;
    const ev = ap.filter(r => r.startDate <= ds && r.endDate >= ds);
    c += `<div class="cc ${it ? 'tod' : ''}"><div class="cd ${iw ? 'we' : ''} ${it ? 'tn' : ''}">${d}</div>
${ev.slice(0, 3).map(v => { const e = gE(v.employeeId), cl = eCol(v.employeeId); return `<div class="cev" style="background:${cl}11;color:${cl};border-color:${cl}">${e?.name || ''}</div>`; }).join('')}
${ev.length > 3 ? `<div style="font-size:9px;color:var(--tm);text-align:center">+${ev.length - 3}</div>` : ''}</div>`;
  }
  return `<div class="panel"><div class="ch"><button class="btn btn-gh" onclick="chM(-1)">◀</button><h2 style="font-size:18px">${CY}년 ${CM + 1}월</h2><button class="btn btn-gh" onclick="chM(1)">▶</button></div>

// Actions
async function aR(id) { const r = D.leaveRequests.find(x => x.id === id); if (r) { r.status = 'approved'; await sv(); R(); } }
async function rR(id) { const r = D.leaveRequests.find(x => x.id === id); if (r) { r.status = 'rejected'; await sv(); R(); } }
async function dR(id) { D.leaveRequests = D.leaveRequests.filter(r => r.id !== id); await sv(); R(); }
async function dE(id) { if (!confirm('이 직원을 삭제하시겠습니까?')) return; D.employees = D.employees.filter(e => e.id !== id); D.accounts = D.accounts.filter(a => a.employeeId !== id); D.leaveRequests = D.leaveRequests.filter(r => r.employeeId !== id); await sv(); R(); }
async function dA(id) { if (!confirm('이 계정을 삭제하시겠습니까?')) return; D.accounts = D.accounts.filter(a => a.id !== id); await sv(); R(); }

function sM(title, body) {
  const o = document.createElement('div'); o.className = 'mo'; o.id = 'mo';

  o.innerHTML = `<div class="modal"><div class="mh"><h3>${title}</h3><button class="mc" onclick="cM()">✕</button></div><div id="mb">${body}</div></div>`;
  document.body.appendChild(o);
}
function cM() { const e = document.getElementById('mo'); if (e) e.remove(); }

function openNR() {
  sM('연차 신청', `
<div class="fg"><label class="fl">유형</label><select class="fs" id="rt"><option value="연차">연차</option><option value="반차(오전)">반차 (오전)</option><option value="반차(오후)">반차 (오후)</option></select></div>

function uRP() { const s = document.getElementById('rs').value, e = document.getElementById('re').value, t = document.getElementById('rt').value, p = document.getElementById('rp'); if (s && e) { const d = cdays(s, e, t), emp = myE(), rem = emp.totalLeave - uLeave(emp.id); p.textContent = `사용: ${d}일 · 잔여: ${rem - d}일`; p.style.display = 'block'; } }
async function subR() { const s = document.getElementById('rs').value, e = document.getElementById('re').value, r = document.getElementById('rr').value, t = document.getElementById('rt').value; if (!s || !e) { alert('날짜를 선택해주세요'); return; } if (s > e) { alert('종료일은 시작일 이후여야 합니다'); return; } D.leaveRequests.push({ id: gid(), employeeId: LU.employeeId, startDate: s, endDate: e, reason: r || '개인 사유', status: 'pending', type: t, createdAt: td() }); await sv(); cM(); R(); }

function openAE() {
  sM('직원 추가', `

async function addE() { const n = document.getElementById('an').value.trim(); if (!n) { alert('이름을 입력해주세요'); return; } const d = document.getElementById('ad').value.trim() || '미정', l = parseInt(document.getElementById('al').value) || 15, r = document.getElementById('ar').value; const li = document.getElementById('ai').value.trim(), pw = document.getElementById('ap').value; const eid = gid(); D.employees.push({ id: eid, name: n, department: d, totalLeave: l, role: r }); if (li) { if (D.accounts.find(a => a.loginId === li)) { alert('이미 존재하는 아이디입니다'); return; } D.accounts.push({ id: gid(), loginId: li, password: pw || '1234', employeeId: eid }); } await sv(); cM(); R(); }

function openAA() { const ul = D.employees.filter(e => !D.accounts.find(a => a.employeeId === e.id)); const opts = ul.length ? ul : D.employees;
  sM('계정 추가', `

<div class="fr"><div class="fg"><label class="fl">부서</label><input class="fi" id="na-dept" placeholder="부서명"></div>
<div class="fg"><label class="fl">역할</label><select class="fs" id="na-role"><option value="member">일반</option><option value="admin">관리자</option></select></div></div></div>

<div class="fr"><div class="fg"><label class="fl">아이디</label><input class="fi" id="na-i" placeholder="로그인 아이디"></div>
<div class="fg"><label class="fl">비밀번호</label><input class="fi" id="na-p" placeholder="비밀번호" value="1234"></div></div>

function toggleAccMode() { const m = document.getElementById('na-mode').value; document.getElementById('na-new-fields').style.display = m === 'new' ? '' : 'none'; document.getElementById('na-exist-field').style.display = m === 'exist' ? '' : 'none'; }
async function addA() { const mode = document.getElementById('na-mode').value, li = document.getElementById('na-i').value.trim(), pw = document.getElementById('na-p').value; if (!li) { alert('아이디를 입력해주세요'); return; } if (D.accounts.find(a => a.loginId === li)) { alert('이미 존재하는 아이디입니다'); return; } let eid; if (mode === 'new') { const nm = document.getElementById('na-name').value.trim(); if (!nm) { alert('이름을 입력해주세요'); return; } const dp = document.getElementById('na-dept').value.trim() || '미정', rl = document.getElementById('na-role').value; eid = gid(); D.employees.push({ id: eid, name: nm, department: dp, totalLeave: 15, role: rl }); } else { eid = document.getElementById('na-e').value; } D.accounts.push({ id: gid(), loginId: li, password: pw || '1234', employeeId: eid }); await sv(); cM(); R(); }

function openEA(aid) { const a = D.accounts.find(x => x.id === aid); if (!a) return; const e = gE(a.employeeId);
  sM('계정 수정', `

<div class="fg"><label class="fl">아이디</label><input class="fi" id="ea-i" value="${a.loginId}"></div>
<div class="fg"><label class="fl">새 비밀번호</label><input class="fi" id="ea-p" placeholder="변경할 비밀번호 (빈칸이면 유지)"></div>
<button class="btn btn-p btn-full" onclick="updAcc('${aid}')">저장하기</button>`);
}
async function updAcc(aid) { const a = D.accounts.find(x => x.id === aid); if (!a) return; const li = document.getElementById('ea-i').value.trim(), pw = document.getElementById('ea-p').value; if (li && li !== a.loginId) { if (D.accounts.find(x => x.loginId === li && x.id !== aid)) { alert('이미 존재하는 아이디입니다'); return; } a.loginId = li; } if (pw) a.password = pw; await sv(); cM(); R(); }

function openMyAcc() { const a = LU, e = myE();
  sM('내 정보', `

<div class="eav" style="width:48px;height:48px;font-size:20px;border-radius:12px">${e?.name?.[0] || '?'}</div>
<div><div style="font-size:16px;font-weight:600">${e?.name} ${rB(e?.role)}</div><div style="font-size:12px;color:var(--ts);margin-top:2px">${e?.department}</div></div></div>
<div class="fg"><label class="fl">이름</label><input class="fi" id="mp-name" value="${e?.name || ''}"></div>
<div class="fg"><label class="fl">부서</label><input class="fi" id="mp-dept" value="${e?.department || ''}"></div>

<div class="fg"><label class="fl">현재 비밀번호</label><input class="fi" type="password" id="mp-o" placeholder="현재 비밀번호"></div>
<div class="fg"><label class="fl">새 비밀번호</label><input class="fi" type="password" id="mp-n" placeholder="새 비밀번호"></div>
<div class="fg"><label class="fl">새 비밀번호 확인</label><input class="fi" type="password" id="mp-c" placeholder="새 비밀번호 확인"></div></div>
<button class="btn btn-p btn-full" onclick="saveMyAcc()">저장하기</button>`);
}
async function saveMyAcc() { const e = myE(); if (!e) return; const nm = document.getElementById('mp-name').value.trim(), dp = document.getElementById('mp-dept').value.trim(); if (nm) e.name = nm; if (dp) e.department = dp; const o = document.getElementById('mp-o').value, n = document.getElementById('mp-n').value, c = document.getElementById('mp-c').value; if (o || n || c) { if (!o || !n) { alert('비밀번호를 입력해주세요'); return; } if (o !== LU.password) { alert('현재 비밀번호가 일치하지 않습니다'); return; } if (n !== c) { alert('새 비밀번호가 일치하지 않습니다'); return; } if (n.length < 4) { alert('비밀번호는 4자 이상이어야 합니다'); return; } const a = D.accounts.find(x => x.id === LU.id); if (a) { a.password = n; LU = a; } } await sv(); alert('저장되었습니다'); cM(); R(); }

async function impData(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.accounts || !parsed.employees || !parsed.leaveRequests) { alert('올바른 백업 파일이 아닙니다.'); return; }
      if (!confirm(`복원하시겠습니까?\n\n직원 ${parsed.employees.length}명, 계정 ${parsed.accounts.length}개\n\n현재 데이터는 교체됩니다.`)) return;
      await fetch(API + '/api/restore', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(parsed) });
      D = parsed; LU = D.accounts[0] || null; if (LU) sessionStorage.setItem('leave-s', LU.id);
      alert('복원 완료!'); R();
    } catch { alert('파일을 읽을 수 없습니다.'); }
  };
  reader.readAsText(file); event.target.value = '';
}
